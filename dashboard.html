<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3 — Today's Workout</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .metric-card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 16px; }
    .metric-card label { display:block; font-size:11px; font-weight:700; color:#71717a; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
    .metric-card .unit-row { display:flex; align-items:center; gap:8px; }
    .metric-card input { flex:1; background:#1c1c1f; border:1px solid #2a2a2f; border-radius:8px; padding:8px 12px; color:white; font-size:20px; font-weight:700; width:100%; }
    .metric-card .unit { font-size:12px; color:#52525b; white-space:nowrap; }
    .ex-num { width:26px; height:26px; border-radius:7px; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.25); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#f97316; flex-shrink:0; }
    .ex-grid { display:grid; gap:8px; margin-top:12px; }
    @media (min-width: 560px) { .ex-grid { grid-template-columns: 72px 72px 140px 1fr; } }
    @media (max-width: 559px) { .ex-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div style="display:flex;min-height:100vh;">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="mobile-header-slot"></div>
      <div class="p3-content" style="padding:28px 24px 60px;max-width:880px;margin:0 auto;">
        <div id="page-content">
          <div style="display:flex;align-items:center;justify-content:center;height:200px;">
            <div style="width:36px;height:36px;border:3px solid #27272a;border-top-color:#f97316;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    const _user = requireAuth()
    if (_user) {
      initSupabase()
      initSidebar(_user)
      document.getElementById('mobile-header-slot').innerHTML = mobileHeader("Today's Workout")
      initPage(_user)
    }
  </script>
</body>
</html>
