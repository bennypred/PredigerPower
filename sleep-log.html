<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3 — Sleep Log</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .sleep-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .sleep-label {
      font-size: 11px;
      font-weight: 700;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .time-input {
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: white;
      font-size: 22px;
      font-weight: 700;
      padding: 10px 16px;
      outline: none;
      transition: border-color 0.15s;
      color-scheme: dark;
    }
    .time-input:focus { border-color: #a855f7; }
    .sleep-textarea {
      width: 100%;
      min-height: 80px;
      background: #111113;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      resize: vertical;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .sleep-textarea:focus { outline: none; border-color: #a855f7; }
    .sleep-textarea::placeholder { color: #3f3f46; }
    .energy-btn {
      flex: 1;
      padding: 10px 4px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      border: 2px solid #27272a;
      background: #111113;
      color: #52525b;
      transition: all 0.12s;
      min-width: 0;
    }
  </style>
</head>
<body>
  <div style="display:flex;min-height:100vh;">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="mobile-header-slot"></div>
      <div class="p3-content" style="padding:28px 24px 56px;max-width:860px;margin:0 auto;">
        <div id="page-content">
          <div style="display:flex;align-items:center;justify-content:center;height:200px;">
            <div style="width:36px;height:36px;border:3px solid #27272a;border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sleep-log.js"></script>
  <script>
    const _user = requireAuth()
    if (_user) {
      initSupabase()
      initSidebar(_user)
      document.getElementById('mobile-header-slot').innerHTML = mobileHeader('Sleep Log')
      initSleepLog(_user)
    }
  </script>
</body>
</html>
