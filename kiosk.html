<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>P3 Rack Station</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0b;
      touch-action: manipulation;
    }
    #kiosk-root {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }
    #kiosk-main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 24px 60px;
    }
    .kiosk-key {
      height: 52px;
      border-radius: 10px;
      border: 1px solid #27272a;
      background: #1c1c1f;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .kiosk-key:active { background: #2a2a2f; transform: scale(0.95); }
    .kiosk-key.digit { background: #18181b; border-color: #222224; }
    .kiosk-key.digit:active { background: #222226; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .metric-card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 16px; }
    .metric-card label { display:block; font-size:11px; font-weight:700; color:#71717a; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
    .metric-card .unit-row { display:flex; align-items:center; gap:8px; }
    .metric-card input { flex:1; background:#1c1c1f; border:1px solid #2a2a2f; border-radius:8px; padding:8px 12px; color:white; font-size:20px; font-weight:700; width:100%; }
    .metric-card .unit { font-size:12px; color:#52525b; white-space:nowrap; }
    .ex-num { width:26px; height:26px; border-radius:7px; background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.25); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#f97316; flex-shrink:0; }
  </style>
</head>
<body>
  <div id="kiosk-root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;">
      <div style="width:36px;height:36px;border:3px solid #27272a;border-top-color:#f97316;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/kiosk.js"></script>
  <script>
    initSupabase()
    initKiosk()
  </script>
</body>
</html>
