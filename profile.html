<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P3 — Athlete Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .chart-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 700;
      color: white;
      margin: 0 0 4px;
    }
    .chart-card .chart-sub {
      font-size: 12px;
      color: #71717a;
      margin: 0 0 16px;
    }
    .chart-wrap {
      position: relative;
      height: 200px;
    }
    .best-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: #f97316;
      font-weight: 600;
    }
    .config-panel-wrap {
      background: #111113;
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
      animation: suggestIn 0.2s ease;
    }
    @keyframes suggestIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .config-check-label {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1c1c1f;
      border: 1px solid #2a2a2f;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
  </style>
</head>
<body>
  <div style="display:flex;min-height:100vh;">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="mobile-header-slot"></div>
      <div class="p3-content" style="padding:28px 24px 56px;max-width:900px;margin:0 auto;">
        <div id="page-content">
          <div style="display:flex;align-items:center;justify-content:center;height:200px;">
            <div style="width:36px;height:36px;border:3px solid #27272a;border-top-color:#f97316;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/profile.js"></script>
  <script>
    const _user = requireAuth()
    if (_user) {
      initSupabase()
      initSidebar(_user)
      document.getElementById('mobile-header-slot').innerHTML = mobileHeader('Profile')
      initPage(_user)
    }
  </script>
</body>
</html>
